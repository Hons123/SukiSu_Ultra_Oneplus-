name: 🧹 Cleanup CCache

on:
  workflow_dispatch:
    inputs:
      cleanup_type:
        type: choice
        description: 'Cleanup target'
        required: true
        default: 'cache_only'
        options:
          - cache_only
          - runs_only
          - full_cleanup
          - analyze_only

      device_filter:
        type: choice
        description: 'Device cache to clean'
        required: false
        default: 'ALL'
        options:
          - ALL
          - android15-6.6
          - android14-6.1
          - android14-5.15
          - android13-5.15
          - android13-5.10
          - android12-5.10
          - OP15T
          - OP15r
          - OP15
          - OP13
          - OP13-CPH
          - OP13-PJZ
          - OP13r
          - OP13S
          - OP13T
          - OP12
          - OP12r
          - OP11
          - OP11r
          - OP10pro
          - OP10t
          - OP10r
          - OP-Nord-5
          - OP-NORD-4
          - OP-NORD-3
          - OP-NORD-4-CE
          - OP-NORD-CE-5
          - OP-NORD-CE4-LITE
          - OP-TURBO-6V
          - OP-TURBO-6
          - OP-ACE-6T
          - OP-ACE-6
          - OP-ACE-5-PRO
          - OP-ACE-5
          - OP-ACE-5-ULTRA
          - OP-ACE-5-RACE
          - OP-ACE-3-PRO
          - OP-ACE-3V
          - OP-ACE-3
          - OP-ACE-2-PRO
          - OP-ACE-2
          - OP-ACE-2V
          - OP-ACE-RACE
          - OP-ACE
          - OP-OPEN
          - OP-PAD-3-SM8750
          - OP-PAD-3-MT6897
          - OP-PAD-2-PRO
          - OP-PAD-2-SM8650
          - OP-PAD-2-MT6991
          - OP-PAD-PRO
          - OP-PAD-MT6983
          - OP-PAD-LITE
          - OP-PAD-GO-2

      cache_pattern:
        type: choice
        description: 'Cache type to clean'
        required: false
        default: 'all_caches'
        options:
          - all_caches
          - ccache_only
          - ccache_stale
          - apt_only
          - kernel_only
          - old_only

      cache_age_days:
        description: 'Delete caches older than N days'
        required: false
        default: '7'

      keep_recent_runs:
        description: 'Keep N most recent successful runs per workflow'
        required: false
        default: '3'

      days_to_keep:
        description: 'Keep runs from last N days'
        required: false
        default: '7'

      dry_run:
        description: 'Dry run, show what would be deleted'
        required: false
        type: boolean
        default: false

      force_cleanup:
        description: 'Force cleanup even if usage is low'
        required: false
        type: boolean
        default: false

permissions:
  actions: write
  contents: read

jobs:
  analyze:
    name: 📊 Analyze Repository Health
    runs-on: ubuntu-latest

    outputs:
      should_cleanup: ${{ steps.analysis.outputs.should_cleanup }}
      total_cache_size: ${{ steps.analysis.outputs.total_size }}
      cache_count: ${{ steps.analysis.outputs.cache_count }}
      usage_percent: ${{ steps.analysis.outputs.usage_percent }}
      ccache_count: ${{ steps.analysis.outputs.ccache_count }}
      ccache_size: ${{ steps.analysis.outputs.ccache_size }}

    steps:
      - name: 📊 Analyze Cache Health
        id: analysis
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            const forceCleanup = String(${{ toJSON(inputs.force_cleanup) }}) === 'true';

            const KNOWN_DEVICES = [
              'android15-6.6',
              'android14-6.1',
              'android14-5.15',
              'android13-5.15',
              'android13-5.10',
              'android12-5.10',
              'OP15T',
              'OP15r',
              'OP15',
              'OP13-CPH',
              'OP13-PJZ',
              'OP13r',
              'OP13S',
              'OP13T',
              'OP13',
              'OP12r',
              'OP12',
              'OP11r',
              'OP11',
              'OP10pro',
              'OP10t',
              'OP10r',
              'OP-Nord-5',
              'OP-NORD-4-CE',
              'OP-NORD-CE4-LITE',
              'OP-NORD-CE-5',
              'OP-NORD-4',
              'OP-NORD-3',
              'OP-TURBO-6V',
              'OP-TURBO-6',
              'OP-ACE-6T',
              'OP-ACE-6',
              'OP-ACE-5-PRO',
              'OP-ACE-5-ULTRA',
              'OP-ACE-5-RACE',
              'OP-ACE-5',
              'OP-ACE-3-PRO',
              'OP-ACE-3V',
              'OP-ACE-3',
              'OP-ACE-2-PRO',
              'OP-ACE-2V',
              'OP-ACE-2',
              'OP-ACE-RACE',
              'OP-ACE',
              'OP-OPEN',
              'OP-PAD-3-SM8750',
              'OP-PAD-3-MT6897',
              'OP-PAD-2-PRO',
              'OP-PAD-2-SM8650',
              'OP-PAD-2-MT6991',
              'OP-PAD-PRO',
              'OP-PAD-MT6983',
              'OP-PAD-LITE',
              'OP-PAD-GO-2'
            ].sort((a, b) => b.length - a.length);

            function gb(bytes) {
              return (bytes / 1024 / 1024 / 1024).toFixed(2);
            }

            function pct(part, total) {
              return total > 0 ? `${((part / total) * 100).toFixed(1)}%` : '0.0%';
            }

            function ageDays(dateString) {
              return Math.floor((Date.now() - new Date(dateString).getTime()) / (1000 * 60 * 60 * 24));
            }

            function extractDevice(cacheKey) {
              for (const device of KNOWN_DEVICES) {
                if (
                  cacheKey.includes(`ccache-${device}-`) ||
                  cacheKey.includes(`-${device}-`) ||
                  cacheKey.includes(device)
                ) {
                  return device;
                }
              }

              const fallback = cacheKey.match(/^ccache-(.+?)-/);
              return fallback ? fallback[1] : 'unknown';
            }

            console.log('🔍 Analyzing repository cache health...\n');

            const caches = await github.paginate(
              github.rest.actions.getActionsCacheList,
              {
                owner,
                repo,
                per_page: 100
              },
              response => response.data.actions_caches || []
            );

            let totalCacheSize = 0;
            let oldestCache = null;
            let newestCache = null;

            const cachesByType = {
              ccache: { size: 0, count: 0 },
              apt: { size: 0, count: 0 },
              kernel: { size: 0, count: 0 },
              other: { size: 0, count: 0 }
            };

            const cachesByDevice = new Map();

            const cacheAgeDistribution = {
              fresh: 0,
              recent: 0,
              old: 0,
              stale: 0
            };

            for (const cache of caches) {
              totalCacheSize += cache.size_in_bytes;

              const cacheAge = ageDays(cache.created_at);

              if (cacheAge < 7) {
                cacheAgeDistribution.fresh++;
              } else if (cacheAge < 14) {
                cacheAgeDistribution.recent++;
              } else if (cacheAge < 30) {
                cacheAgeDistribution.old++;
              } else {
                cacheAgeDistribution.stale++;
              }

              if (!oldestCache || new Date(cache.created_at) < new Date(oldestCache.created_at)) {
                oldestCache = cache;
              }

              if (!newestCache || new Date(cache.created_at) > new Date(newestCache.created_at)) {
                newestCache = cache;
              }

              const key = cache.key || '';

              if (key.startsWith('ccache-')) {
                cachesByType.ccache.size += cache.size_in_bytes;
                cachesByType.ccache.count++;

                const device = extractDevice(key);
                const current = cachesByDevice.get(device) || {
                  size: 0,
                  count: 0,
                  lastAccessed: cache.last_accessed_at || cache.created_at,
                  oldestCache: cacheAge,
                  newestCache: cacheAge
                };

                current.size += cache.size_in_bytes;
                current.count++;
                current.oldestCache = Math.max(current.oldestCache, cacheAge);
                current.newestCache = Math.min(current.newestCache, cacheAge);

                const currentAccess = new Date(current.lastAccessed || current.created_at || 0);
                const cacheAccess = new Date(cache.last_accessed_at || cache.created_at);

                if (cacheAccess > currentAccess) {
                  current.lastAccessed = cache.last_accessed_at || cache.created_at;
                }

                cachesByDevice.set(device, current);
              } else if (key.includes('apt')) {
                cachesByType.apt.size += cache.size_in_bytes;
                cachesByType.apt.count++;
              } else if (key.includes('kernel') || key.includes('android')) {
                cachesByType.kernel.size += cache.size_in_bytes;
                cachesByType.kernel.count++;
              } else {
                cachesByType.other.size += cache.size_in_bytes;
                cachesByType.other.count++;
              }
            }

            const cacheCount = caches.length;
            const totalGB = gb(totalCacheSize);
            const limitGB = 10;
            const usagePercent = ((totalCacheSize / (limitGB * 1024 * 1024 * 1024)) * 100).toFixed(1);
            const shouldCleanup = forceCleanup || parseFloat(usagePercent) > 75;

            let healthEmoji = '🟢';
            let healthStatus = 'Healthy';

            if (parseFloat(usagePercent) > 90) {
              healthEmoji = '🔴';
              healthStatus = 'Critical';
            } else if (parseFloat(usagePercent) > 75) {
              healthEmoji = '🟡';
              healthStatus = 'Warning';
            }

            core.setOutput('should_cleanup', String(shouldCleanup));
            core.setOutput('total_size', String(totalCacheSize));
            core.setOutput('cache_count', String(cacheCount));
            core.setOutput('usage_percent', usagePercent);
            core.setOutput('ccache_count', String(cachesByType.ccache.count));
            core.setOutput('ccache_size', String(cachesByType.ccache.size));

            let summary = core.summary
              .addHeading(`${healthEmoji} Cache Health Analysis - ${healthStatus}`)
              .addRaw('\n### 📊 Overall Statistics\n\n')
              .addTable([
                [{ data: 'Metric', header: true }, { data: 'Value', header: true }],
                ['Total Caches', String(cacheCount)],
                ['Total Size', `${totalGB} GB`],
                ['Limit', `${limitGB} GB`],
                ['Usage', `${usagePercent}%`],
                ['Available', `${(limitGB - parseFloat(totalGB)).toFixed(2)} GB`],
                ['Status', healthStatus]
              ])
              .addRaw('\n### 🗂️ Cache Breakdown by Type\n\n')
              .addTable([
                [
                  { data: 'Type', header: true },
                  { data: 'Count', header: true },
                  { data: 'Size', header: true },
                  { data: 'Percentage', header: true }
                ],
                ['ccache', String(cachesByType.ccache.count), `${gb(cachesByType.ccache.size)} GB`, pct(cachesByType.ccache.size, totalCacheSize)],
                ['Kernel-related', String(cachesByType.kernel.count), `${gb(cachesByType.kernel.size)} GB`, pct(cachesByType.kernel.size, totalCacheSize)],
                ['APT Packages', String(cachesByType.apt.count), `${gb(cachesByType.apt.size)} GB`, pct(cachesByType.apt.size, totalCacheSize)],
                ['Other', String(cachesByType.other.count), `${gb(cachesByType.other.size)} GB`, pct(cachesByType.other.size, totalCacheSize)]
              ])
              .addRaw('\n### 📅 Cache Age Distribution\n\n')
              .addTable([
                [
                  { data: 'Age Range', header: true },
                  { data: 'Count', header: true },
                  { data: 'Percentage', header: true }
                ],
                ['Fresh, < 7 days', String(cacheAgeDistribution.fresh), pct(cacheAgeDistribution.fresh, cacheCount)],
                ['Recent, 7-14 days', String(cacheAgeDistribution.recent), pct(cacheAgeDistribution.recent, cacheCount)],
                ['Old, 14-30 days', String(cacheAgeDistribution.old), pct(cacheAgeDistribution.old, cacheCount)],
                ['Stale, > 30 days', String(cacheAgeDistribution.stale), pct(cacheAgeDistribution.stale, cacheCount)]
              ]);

            if (cachesByType.ccache.count > 0) {
              const avgCcacheSize = cachesByType.ccache.size / cachesByType.ccache.count;

              summary
                .addRaw('\n### ⚡ ccache Statistics\n\n')
                .addTable([
                  [{ data: 'Metric', header: true }, { data: 'Value', header: true }],
                  ['Total ccache Entries', String(cachesByType.ccache.count)],
                  ['Total ccache Size', `${gb(cachesByType.ccache.size)} GB`],
                  ['Average Cache Size', `${(avgCcacheSize / 1024 / 1024).toFixed(2)} MB`],
                  ['Percentage of Total', pct(cachesByType.ccache.size, totalCacheSize)],
                  ['Unique Devices', String(cachesByDevice.size)]
                ]);
            }

            if (cachesByDevice.size > 0) {
              const topDevices = Array.from(cachesByDevice.entries())
                .sort((a, b) => b[1].size - a[1].size)
                .slice(0, 15);

              summary
                .addRaw('\n### 📱 Top 15 Devices by Cache Size\n\n')
                .addTable([
                  [
                    { data: 'Device', header: true },
                    { data: 'Caches', header: true },
                    { data: 'Size', header: true },
                    { data: 'Age Range', header: true }
                  ],
                  ...topDevices.map(([device, data]) => [
                    device,
                    String(data.count),
                    `${gb(data.size)} GB`,
                    `${data.newestCache}-${data.oldestCache} days`
                  ])
                ]);

              const inactiveThreshold = 30;
              const inactiveDevices = Array.from(cachesByDevice.entries())
                .filter(([, data]) => ageDays(data.lastAccessed) > inactiveThreshold)
                .sort((a, b) => b[1].size - a[1].size);

              if (inactiveDevices.length > 0) {
                const inactiveSize = inactiveDevices.reduce((sum, [, data]) => sum + data.size, 0);

                summary
                  .addRaw(`\n### 🚫 Inactive Devices, ${inactiveThreshold}+ Days\n\n`)
                  .addTable([
                    [
                      { data: 'Device', header: true },
                      { data: 'Size', header: true },
                      { data: 'Days Since Access', header: true }
                    ],
                    ...inactiveDevices.slice(0, 10).map(([device, data]) => [
                      device,
                      `${gb(data.size)} GB`,
                      String(ageDays(data.lastAccessed))
                    ])
                  ])
                  .addRaw(`\n💡 **Potential savings:** ${gb(inactiveSize)} GB by cleaning inactive devices.\n`);
              }
            }

            if (oldestCache && newestCache) {
              const oldestDate = new Date(oldestCache.created_at);
              const newestDate = new Date(newestCache.created_at);
              const rangeDays = Math.floor((newestDate - oldestDate) / (1000 * 60 * 60 * 24));

              summary
                .addRaw('\n### 📅 Cache Age Information\n\n')
                .addTable([
                  [{ data: 'Metric', header: true }, { data: 'Value', header: true }],
                  ['Oldest Cache', oldestDate.toISOString().split('T')[0]],
                  ['Newest Cache', newestDate.toISOString().split('T')[0]],
                  ['Age Range', `${rangeDays} days`]
                ]);
            }

            summary.addRaw('\n### 💡 Recommendations\n\n');

            if (parseFloat(usagePercent) > 90) {
              summary
                .addRaw(`- 🔴 **URGENT:** Cache usage is critical at ${usagePercent}%.\n`)
                .addRaw('- Run cleanup immediately with `device_filter: ALL`.\n')
                .addRaw('- Consider reducing ccache size limits in build workflows.\n');
            } else if (parseFloat(usagePercent) > 75) {
              summary
                .addRaw(`- 🟡 **WARNING:** Cache usage is high at ${usagePercent}%.\n`)
                .addRaw('- Schedule cleanup soon.\n')
                .addRaw('- Consider targeting stale ccache entries first.\n');
            } else {
              summary
                .addRaw(`- 🟢 Cache usage is healthy at ${usagePercent}%.\n`)
                .addRaw('- Regular weekly cleanup is still recommended.\n');
            }

            if (shouldCleanup && !forceCleanup) {
              summary.addRaw('\n⚠️ **Cleanup is recommended because usage is above 75%.**\n');
            }

            if (forceCleanup) {
              summary.addRaw('\n⚡ **Force cleanup enabled.**\n');
            }

            await summary.write();

            console.log('\n✅ Analysis complete');
            console.log(`   Total: ${totalGB} GB (${usagePercent}%)`);
            console.log(`   Caches: ${cacheCount}`);
            console.log(`   ccache: ${cachesByType.ccache.count} (${gb(cachesByType.ccache.size)} GB)`);
            console.log(`   Devices: ${cachesByDevice.size}`);
            console.log(`   Cleanup recommended: ${shouldCleanup}`);

  cleanup-caches:
    name: 🗑️ Smart Cache Cleanup
    runs-on: ubuntu-latest
    needs: analyze
    if: ${{ always() && (inputs.cleanup_type == 'cache_only' || inputs.cleanup_type == 'full_cleanup') }}

    steps:
      - name: 🗑️ Delete Matching Caches
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            const deviceFilter = ${{ toJSON(inputs.device_filter) }};
            const cachePattern = ${{ toJSON(inputs.cache_pattern) }};
            const dryRun = String(${{ toJSON(inputs.dry_run) }}) === 'true';
            const forceCleanup = String(${{ toJSON(inputs.force_cleanup) }}) === 'true';
            const cacheAgeDays = Number(${{ toJSON(inputs.cache_age_days) }} || 7);

            const shouldCleanup = String(${{ toJSON(needs.analyze.outputs.should_cleanup) }}) === 'true';
            const usagePercent = ${{ toJSON(needs.analyze.outputs.usage_percent) }};

            const KNOWN_DEVICES = [
              'android15-6.6',
              'android14-6.1',
              'android14-5.15',
              'android13-5.15',
              'android13-5.10',
              'android12-5.10',
              'OP15T',
              'OP15r',
              'OP15',
              'OP13-CPH',
              'OP13-PJZ',
              'OP13r',
              'OP13S',
              'OP13T',
              'OP13',
              'OP12r',
              'OP12',
              'OP11r',
              'OP11',
              'OP10pro',
              'OP10t',
              'OP10r',
              'OP-Nord-5',
              'OP-NORD-4-CE',
              'OP-NORD-CE4-LITE',
              'OP-NORD-CE-5',
              'OP-NORD-4',
              'OP-NORD-3',
              'OP-TURBO-6V',
              'OP-TURBO-6',
              'OP-ACE-6T',
              'OP-ACE-6',
              'OP-ACE-5-PRO',
              'OP-ACE-5-ULTRA',
              'OP-ACE-5-RACE',
              'OP-ACE-5',
              'OP-ACE-3-PRO',
              'OP-ACE-3V',
              'OP-ACE-3',
              'OP-ACE-2-PRO',
              'OP-ACE-2V',
              'OP-ACE-2',
              'OP-ACE-RACE',
              'OP-ACE',
              'OP-OPEN',
              'OP-PAD-3-SM8750',
              'OP-PAD-3-MT6897',
              'OP-PAD-2-PRO',
              'OP-PAD-2-SM8650',
              'OP-PAD-2-MT6991',
              'OP-PAD-PRO',
              'OP-PAD-MT6983',
              'OP-PAD-LITE',
              'OP-PAD-GO-2'
            ].sort((a, b) => b.length - a.length);

            function gb(bytes) {
              return (bytes / 1024 / 1024 / 1024).toFixed(2);
            }

            function mb(bytes) {
              return (bytes / 1024 / 1024).toFixed(2);
            }

            function pct(part, total) {
              return total > 0 ? `${((part / total) * 100).toFixed(1)}%` : '0.0%';
            }

            function ageDays(dateString) {
              return Math.floor((Date.now() - new Date(dateString).getTime()) / (1000 * 60 * 60 * 24));
            }

            function extractDevice(cacheKey) {
              for (const device of KNOWN_DEVICES) {
                if (
                  cacheKey.includes(`ccache-${device}-`) ||
                  cacheKey.includes(`-${device}-`) ||
                  cacheKey.includes(device)
                ) {
                  return device;
                }
              }

              const fallback = cacheKey.match(/^ccache-(.+?)-/);
              return fallback ? fallback[1] : 'unknown';
            }

            function classifyCache(cacheKey) {
              if (cacheKey.startsWith('ccache-')) return 'ccache';
              if (cacheKey.includes('apt')) return 'apt';
              if (cacheKey.includes('kernel') || cacheKey.includes('android')) return 'kernel';
              return 'other';
            }

            function matchesDevice(cacheKey) {
              if (deviceFilter === 'ALL') return true;

              return (
                cacheKey.includes(deviceFilter) ||
                cacheKey.includes(`ccache-${deviceFilter}-`) ||
                cacheKey.includes(`-${deviceFilter}-`) ||
                cacheKey.startsWith(`${deviceFilter}-`)
              );
            }

            function shouldDeleteCache(cache) {
              const key = cache.key || '';
              const created = new Date(cache.created_at);
              const age = ageDays(cache.created_at);

              if (!matchesDevice(key)) {
                return { delete: false, reason: 'device_filter', category: classifyCache(key) };
              }

              const cutoffDate = new Date();
              cutoffDate.setDate(cutoffDate.getDate() - cacheAgeDays);

              const staleCutoffDate = new Date();
              staleCutoffDate.setDate(staleCutoffDate.getDate() - 14);

              let match = false;
              let category = classifyCache(key);

              switch (cachePattern) {
                case 'ccache_only':
                  match = key.startsWith('ccache-');
                  category = 'ccache';
                  break;

                case 'ccache_stale':
                  match = key.startsWith('ccache-') && created < staleCutoffDate;
                  category = 'ccache';
                  break;

                case 'apt_only':
                  match = key.includes('apt-cache') || key.includes('apt-') || key.includes('apt');
                  category = 'apt';
                  break;

                case 'kernel_only':
                  match = key.includes('kernel') || key.includes('android') || key.startsWith('ccache-');
                  category = key.startsWith('ccache-') ? 'ccache' : 'kernel';
                  break;

                case 'old_only':
                  match = created < cutoffDate;
                  category = classifyCache(key);
                  break;

                case 'all_caches':
                default:
                  match = true;
                  category = classifyCache(key);
                  break;
              }

              return {
                delete: match,
                reason: match ? 'match' : 'pattern_mismatch',
                category,
                age
              };
            }

            console.log('🎯 Configuration:');
            console.log(`   Device Filter: ${deviceFilter}`);
            console.log(`   Cache Pattern: ${cachePattern}`);
            console.log(`   Age Threshold: ${cacheAgeDays} days`);
            console.log(`   Dry Run: ${dryRun}`);
            console.log(`   Should Cleanup: ${shouldCleanup}`);
            console.log(`   Force Cleanup: ${forceCleanup}\n`);

            if (!shouldCleanup && !forceCleanup && !dryRun) {
              console.log('ℹ️ Cache usage is healthy, skipping cleanup.');
              console.log('💡 Use force_cleanup=true to cleanup anyway.');

              await core.summary
                .addHeading('ℹ️ Cache Cleanup Skipped')
                .addRaw(`Cache usage is healthy at ${usagePercent || '0.0'}%.\n\n`)
                .addRaw('No cleanup was needed.\n')
                .write();

              return;
            }

            console.log('🔍 Fetching caches...\n');

            const caches = await github.paginate(
              github.rest.actions.getActionsCacheList,
              {
                owner,
                repo,
                per_page: 100
              },
              response => response.data.actions_caches || []
            );

            let affectedCount = 0;
            let affectedSize = 0;
            let failedCount = 0;

            const affectedCaches = [];
            const failedCaches = [];

            const stats = {
              ccache: { count: 0, size: 0 },
              apt: { count: 0, size: 0 },
              kernel: { count: 0, size: 0 },
              other: { count: 0, size: 0 }
            };

            for (const cache of caches) {
              const decision = shouldDeleteCache(cache);

              if (!decision.delete) {
                continue;
              }

              const entry = {
                id: cache.id,
                key: cache.key,
                sizeBytes: cache.size_in_bytes,
                sizeMB: mb(cache.size_in_bytes),
                age: decision.age,
                created: cache.created_at,
                category: decision.category,
                device: cache.key.startsWith('ccache-') ? extractDevice(cache.key) : ''
              };

              if (dryRun) {
                affectedCount++;
                affectedSize += cache.size_in_bytes;
                affectedCaches.push(entry);

                stats[decision.category].count++;
                stats[decision.category].size += cache.size_in_bytes;

                console.log(`🔍 Would delete: ${cache.key}`);
                console.log(`   Size: ${entry.sizeMB} MB | Age: ${entry.age} days | Type: ${entry.category}`);
                continue;
              }

              console.log(`🗑️ Deleting: ${cache.key}`);
              console.log(`   Size: ${entry.sizeMB} MB | Age: ${entry.age} days | Type: ${entry.category}`);

              try {
                await github.rest.actions.deleteActionsCacheById({
                  owner,
                  repo,
                  cache_id: cache.id
                });

                affectedCount++;
                affectedSize += cache.size_in_bytes;
                affectedCaches.push(entry);

                stats[decision.category].count++;
                stats[decision.category].size += cache.size_in_bytes;
              } catch (error) {
                failedCount++;
                failedCaches.push({
                  key: cache.key,
                  reason: error.message
                });

                console.log(`   ⚠️ Failed: ${error.message}`);
              }
            }

            console.log(`\n✅ ${dryRun ? 'Would delete' : 'Deleted'} ${affectedCount} caches`);
            console.log(`📊 Space ${dryRun ? 'would be freed' : 'freed'}: ${mb(affectedSize)} MB (${gb(affectedSize)} GB)`);

            let summary = core.summary
              .addHeading(`🧹 Cache Cleanup ${dryRun ? 'Preview' : 'Summary'}`)
              .addTable([
                [{ data: 'Metric', header: true }, { data: 'Value', header: true }],
                [`Caches ${dryRun ? 'to Delete' : 'Deleted'}`, String(affectedCount)],
                [`Space ${dryRun ? 'to Free' : 'Freed'}`, `${mb(affectedSize)} MB (${gb(affectedSize)} GB)`],
                ['Failed Deletions', String(failedCount)],
                ['Device Filter', deviceFilter],
                ['Cache Pattern', cachePattern],
                ['Age Threshold', `${cacheAgeDays} days`]
              ]);

            summary
              .addHeading('📊 Cleanup Breakdown by Type', 3)
              .addTable([
                [
                  { data: 'Type', header: true },
                  { data: 'Count', header: true },
                  { data: 'Size', header: true },
                  { data: 'Percentage', header: true }
                ],
                ['ccache', String(stats.ccache.count), `${gb(stats.ccache.size)} GB`, pct(stats.ccache.size, affectedSize)],
                ['Kernel-related', String(stats.kernel.count), `${gb(stats.kernel.size)} GB`, pct(stats.kernel.size, affectedSize)],
                ['APT Packages', String(stats.apt.count), `${gb(stats.apt.size)} GB`, pct(stats.apt.size, affectedSize)],
                ['Other', String(stats.other.count), `${gb(stats.other.size)} GB`, pct(stats.other.size, affectedSize)]
              ]);

            if (affectedCaches.length > 0) {
              const largestCaches = [...affectedCaches]
                .sort((a, b) => b.sizeBytes - a.sizeBytes)
                .slice(0, 20);

              summary
                .addHeading(`📦 Top 20 Largest Caches ${dryRun ? 'to Delete' : 'Deleted'}`, 3)
                .addTable([
                  [
                    { data: 'Cache Key', header: true },
                    { data: 'Size', header: true },
                    { data: 'Age', header: true },
                    { data: 'Type', header: true }
                  ],
                  ...largestCaches.map(cache => [
                    cache.key,
                    `${cache.sizeMB} MB`,
                    `${cache.age} days`,
                    cache.category
                  ])
                ]);

              const oldestCaches = [...affectedCaches]
                .sort((a, b) => b.age - a.age)
                .slice(0, 10);

              summary
                .addHeading(`📅 Top 10 Oldest Caches ${dryRun ? 'to Delete' : 'Deleted'}`, 3)
                .addTable([
                  [
                    { data: 'Cache Key', header: true },
                    { data: 'Age', header: true },
                    { data: 'Size', header: true },
                    { data: 'Type', header: true }
                  ],
                  ...oldestCaches.map(cache => [
                    cache.key,
                    `${cache.age} days`,
                    `${cache.sizeMB} MB`,
                    cache.category
                  ])
                ]);
            }

            const ccacheEntries = affectedCaches.filter(cache => cache.category === 'ccache');

            if (ccacheEntries.length > 0) {
              const devices = new Map();

              for (const cache of ccacheEntries) {
                const device = cache.device || 'unknown';
                const current = devices.get(device) || { count: 0, size: 0 };
                current.count++;
                current.size += cache.sizeBytes;
                devices.set(device, current);
              }

              const topDevices = Array.from(devices.entries())
                .sort((a, b) => b[1].size - a[1].size)
                .slice(0, 10);

              summary
                .addHeading(`📱 Top Devices by ${dryRun ? 'Planned' : 'Deleted'} ccache`, 3)
                .addTable([
                  [
                    { data: 'Device', header: true },
                    { data: 'Caches', header: true },
                    { data: 'Size', header: true }
                  ],
                  ...topDevices.map(([device, data]) => [
                    device,
                    String(data.count),
                    `${gb(data.size)} GB`
                  ])
                ]);
            }

            if (failedCaches.length > 0) {
              summary
                .addHeading('⚠️ Failed Deletions', 3)
                .addTable([
                  [
                    { data: 'Cache Key', header: true },
                    { data: 'Reason', header: true }
                  ],
                  ...failedCaches.map(cache => [cache.key, cache.reason])
                ]);
            }

            await summary.write();

  cleanup-runs:
    name: 🗑️ Clean Old Workflow Runs
    runs-on: ubuntu-latest
    needs: analyze
    if: ${{ always() && (inputs.cleanup_type == 'runs_only' || inputs.cleanup_type == 'full_cleanup') }}

    steps:
      - name: 🗑️ Delete Old Workflow Runs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            const keepRecent = Number(${{ toJSON(inputs.keep_recent_runs) }} || 3);
            const daysToKeep = Number(${{ toJSON(inputs.days_to_keep) }} || 7);
            const dryRun = String(${{ toJSON(inputs.dry_run) }}) === 'true';

            const cutoffDate = new Date();
            cutoffDate.setDate(cutoffDate.getDate() - daysToKeep);

            console.log('📅 Configuration:');
            console.log(`   Keeping runs from: ${cutoffDate.toISOString()}`);
            console.log(`   Keeping ${keepRecent} most recent successful runs per workflow`);
            console.log(`   Dry Run: ${dryRun}\n`);

            const workflows = await github.paginate(
              github.rest.actions.listRepoWorkflows,
              {
                owner,
                repo,
                per_page: 100
              },
              response => response.data.workflows || []
            );

            let totalDeleted = 0;
            let totalFailed = 0;
            const workflowStats = [];

            for (const workflow of workflows) {
              console.log(`\n📋 Processing: ${workflow.name}`);

              const runs = await github.paginate(
                github.rest.actions.listWorkflowRuns,
                {
                  owner,
                  repo,
                  workflow_id: workflow.id,
                  per_page: 100
                },
                response => response.data.workflow_runs || []
              );

              runs.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

              let successfulSeen = 0;
              let deletedInWorkflow = 0;
              let failedInWorkflow = 0;

              const runsByStatus = {
                success: 0,
                failure: 0,
                cancelled: 0,
                skipped: 0,
                other: 0
              };

              for (const run of runs) {
                const conclusion = run.conclusion || 'other';

                if (Object.prototype.hasOwnProperty.call(runsByStatus, conclusion)) {
                  runsByStatus[conclusion]++;
                } else {
                  runsByStatus.other++;
                }

                const runDate = new Date(run.created_at);
                const ageDays = Math.floor((Date.now() - runDate.getTime()) / (1000 * 60 * 60 * 24));
                const isOld = runDate < cutoffDate;

                let tooManySuccessful = false;

                if (run.conclusion === 'success') {
                  successfulSeen++;
                  tooManySuccessful = successfulSeen > keepRecent;
                }

                const shouldDelete =
                  isOld &&
                  (
                    run.conclusion === 'failure' ||
                    run.conclusion === 'cancelled' ||
                    run.conclusion === 'skipped' ||
                    tooManySuccessful
                  );

                if (!shouldDelete) {
                  continue;
                }

                if (dryRun) {
                  console.log(`🔍 Would delete: #${run.run_number} (${run.conclusion}, ${ageDays}d old)`);
                  deletedInWorkflow++;
                  totalDeleted++;
                  continue;
                }

                console.log(`🗑️ Deleting: #${run.run_number} (${run.conclusion}, ${ageDays}d old)`);

                try {
                  await github.rest.actions.deleteWorkflowRun({
                    owner,
                    repo,
                    run_id: run.id
                  });

                  deletedInWorkflow++;
                  totalDeleted++;
                } catch (error) {
                  console.log(`   ⚠️ Failed: ${error.message}`);
                  failedInWorkflow++;
                  totalFailed++;
                }
              }

              if (deletedInWorkflow > 0 || Object.values(runsByStatus).some(value => value > 0)) {
                workflowStats.push({
                  name: workflow.name,
                  deleted: deletedInWorkflow,
                  failed: failedInWorkflow,
                  stats: runsByStatus
                });
              }
            }

            console.log(`\n✅ Total runs ${dryRun ? 'to delete' : 'deleted'}: ${totalDeleted}`);
            console.log(`⚠️ Failed deletions: ${totalFailed}`);

            let summary = core.summary
              .addHeading(`🧹 Workflow Runs ${dryRun ? 'Preview' : 'Summary'}`)
              .addTable([
                [{ data: 'Metric', header: true }, { data: 'Value', header: true }],
                [`Runs ${dryRun ? 'to Delete' : 'Deleted'}`, String(totalDeleted)],
                ['Failed Deletions', String(totalFailed)],
                ['Kept Recent Successful per Workflow', String(keepRecent)],
                ['Days Kept', String(daysToKeep)]
              ]);

            if (workflowStats.length > 0) {
              summary
                .addHeading('📊 Per-Workflow Breakdown', 3)
                .addTable([
                  [
                    { data: 'Workflow', header: true },
                    { data: dryRun ? 'To Delete' : 'Deleted', header: true },
                    { data: 'Failed', header: true },
                    { data: 'Success', header: true },
                    { data: 'Failure', header: true },
                    { data: 'Cancelled', header: true }
                  ],
                  ...workflowStats.map(workflow => [
                    workflow.name,
                    String(workflow.deleted),
                    String(workflow.failed),
                    String(workflow.stats.success),
                    String(workflow.stats.failure),
                    String(workflow.stats.cancelled)
                  ])
                ]);
            }

            await summary.write();

  final-report:
    name: 📊 Final Repository Health Report
    runs-on: ubuntu-latest
    needs:
      - analyze
      - cleanup-caches
      - cleanup-runs
    if: ${{ always() }}

    steps:
      - name: 📊 Generate Final Health Report
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            const dryRun = String(${{ toJSON(inputs.dry_run) }}) === 'true';

            function gb(bytes) {
              return (bytes / 1024 / 1024 / 1024).toFixed(2);
            }

            function pct(part, total) {
              return total > 0 ? `${((part / total) * 100).toFixed(1)}%` : '0.0%';
            }

            console.log('📊 Generating final health report...\n');

            const caches = await github.paginate(
              github.rest.actions.getActionsCacheList,
              {
                owner,
                repo,
                per_page: 100
              },
              response => response.data.actions_caches || []
            );

            let totalCacheSize = 0;

            const cachesByType = {
              ccache: 0,
              apt: 0,
              kernel: 0,
              other: 0
            };

            const buildFrequency = new Map();
            const recentCutoff = new Date();
            recentCutoff.setDate(recentCutoff.getDate() - 30);

            for (const cache of caches) {
              const key = cache.key || '';

              totalCacheSize += cache.size_in_bytes;

              if (key.startsWith('ccache-')) {
                cachesByType.ccache += cache.size_in_bytes;

                if (new Date(cache.last_accessed_at || cache.created_at) > recentCutoff) {
                  const match = key.match(/^ccache-(.+?)-/);
                  const device = match ? match[1] : 'unknown';
                  buildFrequency.set(device, (buildFrequency.get(device) || 0) + 1);
                }
              } else if (key.includes('apt')) {
                cachesByType.apt += cache.size_in_bytes;
              } else if (key.includes('kernel') || key.includes('android')) {
                cachesByType.kernel += cache.size_in_bytes;
              } else {
                cachesByType.other += cache.size_in_bytes;
              }
            }

            const cacheCount = caches.length;
            const limitGB = 10;
            const totalGB = gb(totalCacheSize);
            const usagePercent = ((totalCacheSize / (limitGB * 1024 * 1024 * 1024)) * 100).toFixed(1);

            const beforeSize = Number(${{ toJSON(needs.analyze.outputs.total_cache_size) }} || 0);
            const beforeCount = Number(${{ toJSON(needs.analyze.outputs.cache_count) }} || 0);
            const beforePercent = Number(${{ toJSON(needs.analyze.outputs.usage_percent) }} || 0);

            let changeInfo = '';

            if (beforeSize > 0 && !dryRun) {
              const sizeChange = beforeSize - totalCacheSize;
              const countChange = beforeCount - cacheCount;
              const percentChange = beforePercent - parseFloat(usagePercent);

              changeInfo =
                '\n### 📈 Cleanup Impact\n\n' +
                `- **Space Freed:** ${gb(sizeChange)} GB\n` +
                `- **Caches Removed:** ${countChange}\n` +
                `- **Usage Reduced:** ${percentChange.toFixed(1)}%\n`;
            }

            let healthEmoji = '🟢';
            let healthStatus = 'Healthy';

            if (parseFloat(usagePercent) > 90) {
              healthEmoji = '🔴';
              healthStatus = 'Critical - Immediate cleanup needed';
            } else if (parseFloat(usagePercent) > 75) {
              healthEmoji = '🟡';
              healthStatus = 'Warning - Consider cleanup soon';
            }

            let summary = core.summary
              .addHeading(`${healthEmoji} Final Repository Health Report`)
              .addRaw(dryRun ? '\n**⚠️ This was a DRY RUN. No changes were made.**\n\n' : '\n')
              .addTable([
                [
                  { data: 'Cache Type', header: true },
                  { data: 'Size', header: true },
                  { data: 'Percentage', header: true }
                ],
                ['ccache', `${gb(cachesByType.ccache)} GB`, pct(cachesByType.ccache, totalCacheSize)],
                ['Kernel-related', `${gb(cachesByType.kernel)} GB`, pct(cachesByType.kernel, totalCacheSize)],
                ['APT Packages', `${gb(cachesByType.apt)} GB`, pct(cachesByType.apt, totalCacheSize)],
                ['Other', `${gb(cachesByType.other)} GB`, pct(cachesByType.other, totalCacheSize)],
                ['**Total**', `**${totalGB} GB**`, '**100%**']
              ])
              .addRaw('\n### 📊 Current Usage Statistics\n\n')
              .addRaw(`- **Total Caches:** ${cacheCount}\n`)
              .addRaw(`- **Limit:** ${limitGB} GB\n`)
              .addRaw(`- **Current Usage:** ${totalGB} GB (${usagePercent}%)\n`)
              .addRaw(`- **Available:** ${(limitGB - parseFloat(totalGB)).toFixed(2)} GB\n`)
              .addRaw(`- **Status:** ${healthStatus}\n`)
              .addRaw(changeInfo);

            if (buildFrequency.size > 0) {
              const activeDevices = Array.from(buildFrequency.entries())
                .filter(([, count]) => count >= 3)
                .sort((a, b) => b[1] - a[1]);

              summary
                .addRaw('\n### 📱 Build Activity Analysis, Last 30 Days\n\n')
                .addRaw(`- **Active Devices:** ${activeDevices.length}\n`)
                .addRaw(`- **Total Build Events:** ${Array.from(buildFrequency.values()).reduce((a, b) => a + b, 0)}\n`);

              if (activeDevices.length > 0) {
                summary
                  .addRaw('\n**Top 10 Most Active Devices:**\n')
                  .addTable([
                    [
                      { data: 'Device', header: true },
                      { data: 'Build Events', header: true }
                    ],
                    ...activeDevices.slice(0, 10).map(([device, count]) => [
                      device,
                      String(count)
                    ])
                  ]);
              }
            }

            summary.addRaw('\n### 💡 Next Steps\n\n');

            if (dryRun) {
              summary.addRaw('- ℹ️ This was a dry run. Run again with `dry_run: false` to apply changes.\n');
            } else if (parseFloat(usagePercent) > 75) {
              summary
                .addRaw('- ⚠️ **Action Required:** Usage is still high.\n')
                .addRaw('- Target specific devices or stale ccache entries.\n')
                .addRaw('- Review ccache size limits in build workflows.\n');
            } else {
              summary
                .addRaw('- ✅ Cache usage is healthy.\n')
                .addRaw('- Schedule regular cleanup to avoid hitting the GitHub cache limit.\n');
            }

            summary
              .addRaw('\n### 🔄 Cleanup Schedule Recommendations\n\n')
              .addRaw('- **Daily:** If building more than 10 devices regularly.\n')
              .addRaw('- **Weekly:** For moderate usage, around 5-10 devices.\n')
              .addRaw('- **Monthly:** For light usage, fewer than 5 devices.\n')
              .addRaw('- **On-demand:** When usage exceeds 75%.\n');

            await summary.write();

            console.log('\n✅ Final report generated');
            console.log(`   Current usage: ${totalGB} GB (${usagePercent}%)`);
            console.log(`   Status: ${healthStatus}`);

      - name: 💡 Quick Action Commands
        if: ${{ always() }}
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'

          ---

          ## 🚀 Quick Action Commands

          ### High Usage Cleanup

          ```bash
          gh workflow run cleanup-ccache.yml \
            -f cleanup_type=cache_only \
            -f cache_pattern=old_only \
            -f cache_age_days=7

          gh workflow run cleanup-ccache.yml \
            -f cleanup_type=cache_only \
            -f cache_pattern=ccache_stale

          gh workflow run cleanup-ccache.yml \
            -f cleanup_type=cache_only \
            -f device_filter=OP13 \
            -f cache_pattern=ccache_only
          ```

          ### Regular Maintenance

          ```bash
          gh workflow run cleanup-ccache.yml \
            -f cleanup_type=full_cleanup \
            -f cache_age_days=14

          gh workflow run cleanup-ccache.yml \
            -f cleanup_type=analyze_only

          gh workflow run cleanup-ccache.yml \
            -f cleanup_type=cache_only \
            -f dry_run=true
          ```

          ### Emergency Cleanup

          ```bash
          gh workflow run cleanup-ccache.yml \
            -f cleanup_type=full_cleanup \
            -f force_cleanup=true \
            -f cache_age_days=3

          gh workflow run cleanup-ccache.yml \
            -f cleanup_type=cache_only \
            -f cache_pattern=ccache_only \
            -f force_cleanup=true
          ```

          ### Device-Specific Cleanup

          ```bash
          gh workflow run cleanup-ccache.yml \
            -f cleanup_type=cache_only \
            -f device_filter=android15-6.6 \
            -f cache_pattern=ccache_only

          gh workflow run cleanup-ccache.yml \
            -f cleanup_type=cache_only \
            -f device_filter=OP13 \
            -f cache_pattern=all_caches
          ```

          ### Workflow Runs Cleanup

          ```bash
          gh workflow run cleanup-ccache.yml \
            -f cleanup_type=runs_only \
            -f days_to_keep=7 \
            -f keep_recent_runs=3
          ```

          ---

          **💡 Tip:** Use `dry_run=true` first to preview what will be deleted.

          EOF
